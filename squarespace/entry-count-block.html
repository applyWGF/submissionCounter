<!--
  Paste this into a Squarespace Code Block on your application page.

  Replace GITHUB_OWNER and GITHUB_REPO with your repository path.
  Example: https://cdn.jsdelivr.net/gh/wgfoundation/WGF@main/public/count.json

  The count is updated every 15 minutes by GitHub Actions — no API keys on this page.
-->
<div id="entry-count-widget">
  <p class="entry-count-label">Applications submitted</p>
  <p class="entry-count-number" aria-live="polite">—</p>
</div>

<style>
  #entry-count-widget {
    text-align: center;
    padding: 1.5rem;
  }
  .entry-count-label {
    font-size: 1rem;
    margin: 0 0 0.5rem;
    opacity: 0.85;
  }
  .entry-count-number {
    font-size: 2.5rem;
    font-weight: 700;
    margin: 0;
    line-height: 1.2;
  }
</style>

<script>
(function () {
  var COUNT_URL = 'https://cdn.jsdelivr.net/gh/GITHUB_OWNER/GITHUB_REPO@main/public/count.json';
  var numberEl = document.querySelector('#entry-count-widget .entry-count-number');

  if (!numberEl) return;

  fetch(COUNT_URL)
    .then(function (res) {
      if (!res.ok) throw new Error('Request failed');
      return res.json();
    })
    .then(function (data) {
      if (typeof data.count !== 'number') throw new Error('Invalid response');
      numberEl.textContent = data.count.toLocaleString();
    })
    .catch(function () {
      numberEl.textContent = '—';
      numberEl.setAttribute('aria-label', 'Count temporarily unavailable');
    });
})();
</script>
