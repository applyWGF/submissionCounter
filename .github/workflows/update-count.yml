name: Update submission count

on:
  schedule:
    # Every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-count:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Fetch count from Submittable
        env:
          SUBMITTABLE_API_KEY: ${{ secrets.SUBMITTABLE_API_KEY }}
          SUBMITTABLE_PROJECT_ID: ${{ secrets.SUBMITTABLE_PROJECT_ID }}
        run: node scripts/update-count.js

      - name: Commit and push count.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/count.json
          if git diff --staged --quiet; then
            echo "No change to count.json"
          else
            git commit -m "chore: update submission count"
            git push
          fi

      - name: Purge jsDelivr cache
        continue-on-error: true
        run: |
          curl -sS -X POST "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/public/count.json" \
            || echo "jsDelivr purge unavailable — count.json was still updated in the repo"
