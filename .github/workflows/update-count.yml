name: Update submission count

on:
  schedule:
    # Every 15 minutes, off peak minutes to reduce GitHub schedule skips
    - cron: '3,18,33,48 * * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-count:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Fetch count from Submittable
        env:
          SUBMITTABLE_API_KEY: ${{ secrets.SUBMITTABLE_API_KEY }}
          SUBMITTABLE_PROJECT_ID: ${{ secrets.SUBMITTABLE_PROJECT_ID }}
        run: node scripts/update-count.js

      - name: Commit and push count.json
        id: publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/count.json
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No change to count.json"
            exit 0
          fi
          git commit -m "chore: update submission count"
          git pull --rebase origin main
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Tag release for jsDelivr
        if: steps.publish.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="1.0.${GITHUB_RUN_ID}"
          git tag "$TAG"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" "$TAG"
          echo "Tagged $TAG for jsDelivr @latest"

      - name: Purge jsDelivr cache
        if: steps.publish.outputs.changed == 'true'
        continue-on-error: true
        run: |
          # Brief pause so jsDelivr picks up the new tag before purge
          sleep 10
          curl -sS "https://purge.jsdelivr.net/gh/${{ github.repository }}@latest/public/count.json"
